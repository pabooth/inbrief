# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# https://docs.coderabbit.ai/reference/configuration

language: en-GB
focus: balanced
tone_instructions: "Be direct and concise. Prefer actionable findings over observations. Avoid restating what the code does unless it explains a concrete risk."
early_access: false

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_instructions: |
    Summarise the change in 2–3 sentences, then list:
    - affected files (inbrief.py, oauth_setup.py, config.example, tests, or CI)
    - tests added or updated
    Explicitly call out any changes that affect credentials handling, prompt construction, or HTML output.
  auto_title_instructions: >
    Format: "<type>(<scope>): <title>".
    Type must be one of: feat, fix, docs, refactor, test, chore, ci.
    Scope should be one of: core, oauth, config, tests, ci, docs.
    Title should be concise (≤ 72 chars).
    Example: "fix(core): escape sender address in email template"
  poem: false
  in_progress_fortune: false
  sequence_diagrams: false
  review_status: true
  review_details: true
  changed_files_summary: true
  estimate_code_review_effort: true
  collapse_walkthrough: false
  suggested_labels: true
  labeling_instructions:
    - label: security
      instructions: Apply when the PR changes credentials handling, OAuth flow, SMTP auth, prompt construction, or HTML escaping.
    - label: tests
      instructions: Apply when the PR primarily adds or restructures automated tests.
    - label: ci
      instructions: Apply when the PR changes GitHub Actions workflows or dependabot config.
    - label: docs
      instructions: Apply when the PR is primarily documentation — README, SECURITY.md, CONTRIBUTING.md.
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - "WIP"
      - "[skip review]"
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!.venv/**"
    - "!dist/**"
    - "!**/__pycache__/**"
    - "!**/*.pyc"
    - "!.pytest_cache/**"
    - "!.ruff_cache/**"
    - "!*.egg-info/**"
  path_instructions:
    - path: "inbrief.py"
      instructions: |
        Focus on:
        - Secrets handling: API keys, SMTP credentials, and OAuth tokens must only be read via get_secret() or environment variables — never hardcoded or logged.
        - Prompt injection: email bodies are untrusted input. Check that they remain isolated inside <sources> tags and cannot escape into the instruction portion of the prompt.
        - HTML output: verify that all dynamic values inserted into the email template are properly escaped to prevent XSS.
        - Email header injection: confirm reject_header_injection() is called on every user-controlled header value.
        - SMTP TLS: flag any path that could send credentials or email content over an unencrypted connection.
    - path: "oauth_setup.py"
      instructions: |
        Check that token files are written with 0o600 permissions, that the OAuth scope remains read-only, and that no credentials are printed or logged.
    - path: "config.example"
      instructions: |
        Reject any real email addresses, API keys, SMTP credentials, Gmail label IDs, or other personal data. All values must be obvious placeholders.
    - path: "tests/**"
      instructions: |
        Check for real credentials or personal data in test fixtures. Verify that security-sensitive paths (injection, escaping, header injection) have meaningful assertions, not just coverage hits.
    - path: ".github/workflows/**"
      instructions: |
        Check for secret leakage in workflow steps, overly broad permissions, and unpinned third-party actions.

chat:
  auto_reply: true
  art: false

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "README.md"
      - "SECURITY.md"
  learnings:
    scope: local
  issues:
    scope: auto
  pull_requests:
    scope: auto

name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Do not include email content, OAuth files or tokens, API keys, SMTP credentials, or personal addresses.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem would this solve, and who encounters it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or workflow you would like.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Gmail or OAuth
        - Digest generation
        - SMTP delivery
        - Configuration or scheduling
        - Packaging or installation
        - Unsure or cross-cutting
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe current workarounds or alternative approaches, if any.
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and security impact
      description: Note any effect on email access, data sent to model providers, OAuth scope, credentials, or delivery.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add sanitized examples or links that clarify the request.

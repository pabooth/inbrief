name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest
      - name: Build distributions
        run: python -m build
      - name: Smoke-test built wheel
        run: |
          test -n "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          python -m venv /tmp/inbrief-wheel
          /tmp/inbrief-wheel/bin/python -m pip install dist/*.whl
          /tmp/inbrief-wheel/bin/inbrief --version
          /tmp/inbrief-wheel/bin/inbrief --help > /dev/null
          /tmp/inbrief-wheel/bin/inbrief-oauth --version
          /tmp/inbrief-wheel/bin/inbrief-oauth --help > /dev/null
